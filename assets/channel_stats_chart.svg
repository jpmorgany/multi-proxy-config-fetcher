<?xml version="1.0" encoding="UTF-8"?>
    <svg width="800" height="250" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#16a34a"/>
            <stop offset="100%" stop-color="#4ade80"/>
        </linearGradient>
        <linearGradient id="grad-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ca8a04"/>
            <stop offset="100%" stop-color="#fde047"/>
        </linearGradient>
        <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#dc2626"/>
            <stop offset="100%" stop-color="#f87171"/>
        </linearGradient>
        <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="50%" stop-color="rgba(255,255,255,0.4)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <style>
        .bg-rect { fill: #0f172a; }
        .title { font: bold 22px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
        .row { font: bold 15px 'Segoe UI', Arial, sans-serif; fill: #38bdf8; filter: url(#glow); }
        .score { font: bold 14px 'Segoe UI', Arial, sans-serif; fill: #f1f5f9; }
        @keyframes shimmer-anim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .shimmer-rect {
            animation: shimmer-anim 2.5s infinite linear;
        }
    </style>
    <rect width="100%" height="100%" class="bg-rect"/>
    <text x="400" y="45" text-anchor="middle" class="title">Channel Performance Overview</text>
        <rect x="150" y="80" width="500" height="30" fill="#1e293b" rx="6"/>
        <clipPath id="clip-0">
            <rect x="150" y="80" width="499.95" height="30" rx="6"/>
        </clipPath>
        <rect x="150" y="80" width="499.95" height="30" fill="url(#grad-green)" rx="6"/>
        <g clip-path="url(#clip-0)">
            <rect x="150" y="80" width="100%" height="30" fill="url(#shimmer)" class="shimmer-rect"/>
        </g>
        <text x="135" y="100" text-anchor="end" class="row">BLACK_SS%2BAll_RUS.txt</text>
        <text x="665" y="100" text-anchor="start" class="score">100.0% (S:100%)</text>
        <rect x="150" y="130" width="500" height="30" fill="#1e293b" rx="6"/>
        <clipPath id="clip-1">
            <rect x="150" y="130" width="499.6" height="30" rx="6"/>
        </clipPath>
        <rect x="150" y="130" width="499.6" height="30" fill="url(#grad-green)" rx="6"/>
        <g clip-path="url(#clip-1)">
            <rect x="150" y="130" width="100%" height="30" fill="url(#shimmer)" class="shimmer-rect"/>
        </g>
        <text x="135" y="150" text-anchor="end" class="row">Telegram-Channel-@Masir_Sefid.txt</text>
        <text x="665" y="150" text-anchor="start" class="score">99.9% (S:100%)</text>
        <rect x="150" y="180" width="500" height="30" fill="#1e293b" rx="6"/>
        <clipPath id="clip-2">
            <rect x="150" y="180" width="439.3" height="30" rx="6"/>
        </clipPath>
        <rect x="150" y="180" width="439.3" height="30" fill="url(#grad-green)" rx="6"/>
        <g clip-path="url(#clip-2)">
            <rect x="150" y="180" width="100%" height="30" fill="url(#shimmer)" class="shimmer-rect"/>
        </g>
        <text x="135" y="200" text-anchor="end" class="row">1</text>
        <text x="665" y="200" text-anchor="start" class="score">87.9% (S:100%)</text></svg>